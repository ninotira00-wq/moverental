<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#0B6B8F"/>
  
  <!-- Left Wheel -->
  <circle cx="300" cy="550" r="120" fill="none" stroke="white" stroke-width="50"/>
  
  <!-- Right Wheel -->
  <circle cx="700" cy="550" r="120" fill="none" stroke="white" stroke-width="50"/>
  
  <!-- Upward Arrow/Frame Path -->
  <path d="M 300 550 Q 400 350 500 400 Q 600 450 700 550" 
        fill="none" stroke="white" stroke-width="70" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow Head -->
  <path d="M 750 250 L 900 300 L 850 420 Z" fill="white"/>
  
  <!-- Move Text -->
  <text x="500" y="850" font-family="Arial, sans-serif" font-size="180" font-weight="bold" 
        fill="white" text-anchor="middle" letter-spacing="10">Move</text>
</svg>